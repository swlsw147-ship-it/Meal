<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>UNIST 식단</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 16px;
      font-size: 18px;
      line-height: 1.5;
      background: #f7f7f7;
      color: #111;
    }

    h1 {
      font-size: 30px;
      margin: 0 0 8px 0;
    }

    .sub {
      font-size: 16px;
      color: #555;
      margin-bottom: 14px;
    }

    .tab-row {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      margin-bottom: 12px;
      padding-bottom: 4px;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 10px 14px;
      background: #e7e7e7;
      color: #111;
      font-size: 16px;
      font-weight: bold;
      white-space: nowrap;
      cursor: pointer;
    }

    button.active {
      background: #111;
      color: #fff;
    }

    .nav-row {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
    }

    .nav-btn {
      flex: 1;
    }

    .cards {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .card h2 {
      margin: 0 0 10px 0;
      font-size: 24px;
    }

    .menu {
      white-space: pre-line;
      font-size: 20px;
      line-height: 1.7;
    }

    .empty {
      color: #888;
    }

    .calorie {
      margin-top: 14px;
      font-size: 17px;
      color: #444;
    }

    .footer-note {
      margin-top: 18px;
      font-size: 14px;
      color: #666;
    }
  </style>
</head>
<body>
  <h1>UNIST 식단</h1>
  <div class="sub" id="currentLabel">불러오는 중...</div>

  <div class="tab-row" id="dayTabs"></div>

  <div class="nav-row">
    <button class="nav-btn" onclick="moveDay(-1)">← 이전 요일</button>
    <button class="nav-btn" onclick="moveDay(1)">다음 요일 →</button>
  </div>

  <div class="tab-row" id="mealTabs"></div>

  <div class="cards">
    <div class="card">
      <h2>교직원 식당</h2>
      <div class="menu" id="facultyMenu">불러오는 중...</div>
      <div class="calorie" id="facultyCalorie"></div>
    </div>

    <div class="card">
      <h2>학생 식당</h2>
      <div class="menu" id="studentMenu">불러오는 중...</div>
      <div class="calorie" id="studentCalorie"></div>
    </div>

    <div class="card">
      <h2>기숙사 식당</h2>
      <div class="menu" id="dormMenu">불러오는 중...</div>
      <div class="calorie" id="dormCalorie"></div>
    </div>
  </div>

  <div class="footer-note">
    요일과 식사 시간을 눌러 바꿔볼 수 있습니다.
  </div>

  <script>
    const DAY_CODES = ["SUN", "MON", "TUE", "WED", "THU", "FRI", "SAT"];
    const DAY_LABELS = ["일", "월", "화", "수", "목", "금", "토"];

    const MEAL_TYPES = ["BREAKFAST", "LUNCH", "DINNER"];
    const MEAL_LABELS = {
      BREAKFAST: "아침",
      LUNCH: "점심",
      DINNER: "저녁"
    };

    const RESTAURANTS = [
      {
        key: "faculty",
        title: "교직원 식당",
        elementMenu: "facultyMenu",
        elementCalorie: "facultyCalorie",
        aliases: ["교직원 식당"]
      },
      {
        key: "student",
        title: "학생 식당",
        elementMenu: "studentMenu",
        elementCalorie: "studentCalorie",
        aliases: ["학생 식당"]
      },
      {
        key: "dorm",
        title: "기숙사 식당",
        elementMenu: "dormMenu",
        elementCalorie: "dormCalorie",
        aliases: ["기숙사 식당"]
      }
    ];

    let allData = [];
    let selectedDayIndex = new Date().getDay();
    let selectedMealType = getDefaultMealType();

    function getDefaultMealType() {
      const hour = new Date().getHours();
      if (hour < 8) return "BREAKFAST";
      if (hour < 13) return "LUNCH";
      return "DINNER";
    }

    function renderDayTabs() {
      const container = document.getElementById("dayTabs");
      container.innerHTML = "";

      DAY_LABELS.forEach((label, index) => {
        const btn = document.createElement("button");
        btn.textContent = label;
        if (index === selectedDayIndex) btn.classList.add("active");
        btn.onclick = () => {
          selectedDayIndex = index;
          renderAll();
        };
        container.appendChild(btn);
      });
    }

    function renderMealTabs() {
      const container = document.getElementById("mealTabs");
      container.innerHTML = "";

      MEAL_TYPES.forEach((mealType) => {
        const btn = document.createElement("button");
        btn.textContent = MEAL_LABELS[mealType];
        if (mealType === selectedMealType) btn.classList.add("active");
        btn.onclick = () => {
          selectedMealType = mealType;
          renderAll();
        };
        container.appendChild(btn);
      });
    }

    function moveDay(step) {
      selectedDayIndex = (selectedDayIndex + step + 7) % 7;
      renderAll();
    }

    function setHeaderLabel() {
      document.getElementById("currentLabel").textContent =
        `${DAY_LABELS[selectedDayIndex]}요일 · ${MEAL_LABELS[selectedMealType]}`;
    }

    function findMeal(dayCode, mealType, aliases) {
      return allData.find(item =>
        item.dayType === dayCode &&
        item.mealType === mealType &&
        aliases.includes(item.restaurantType)
      );
    }

    function fillRestaurantCard(restaurant) {
      const dayCode = DAY_CODES[selectedDayIndex];
      const result = findMeal(dayCode, selectedMealType, restaurant.aliases);

      const menuEl = document.getElementById(restaurant.elementMenu);
      const calorieEl = document.getElementById(restaurant.elementCalorie);

      if (!result) {
        menuEl.textContent = "해당 메뉴가 없습니다.";
        menuEl.classList.add("empty");
        calorieEl.textContent = "";
        return;
      }

      menuEl.textContent = result.menus.join("\n");
      menuEl.classList.remove("empty");
      calorieEl.textContent = result.calorie ? `🔥 ${result.calorie} kcal` : "";
    }

    function renderAll() {
      renderDayTabs();
      renderMealTabs();
      setHeaderLabel();

      RESTAURANTS.forEach(fillRestaurantCard);
    }

    async function init() {
      try {
        const res = await fetch("https://meal.hexa.pro/mainpage/data");
        allData = await res.json();
        renderAll();
      } catch (e) {
        document.getElementById("currentLabel").textContent = "데이터를 불러오지 못했습니다.";
        document.getElementById("facultyMenu").textContent = "불러오기 실패";
        document.getElementById("studentMenu").textContent = "불러오기 실패";
        document.getElementById("dormMenu").textContent = "불러오기 실패";
      }
    }

    init();
  </script>
</body>
</html>
