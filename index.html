<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>교직원 식당 메뉴</title>
</head>
<body>
<h2>🍽 오늘 교직원 식당 점심</h2>
<pre id="menu">불러오는 중...</pre>

<script>
async function loadMenu() {
  const res = await fetch("https://meal.hexa.pro/mainpage/data");
  const data = await res.json();

  const dayMap = ["SUN","MON","TUE","WED","THU","FRI","SAT"];
  const today = dayMap[new Date().getDay()];

  const result = data.find(item =>
    item.dayType === today &&
    item.mealType === "LUNCH" &&
    item.restaurantType === "교직원 식당"
  );

  const el = document.getElementById("menu");

  if (!result) {
    el.textContent = "메뉴 없음";
    return;
  }

  el.textContent = result.menus.join("\n") + 
    "\n\n🔥 " + (result.calorie || "");
}

loadMenu();
</script>
</body>
</html>
