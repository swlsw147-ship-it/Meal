<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>UNIST 식단</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 14px;
      font-family: Arial, sans-serif;
      background: #f5f6f8;
      color: #111;
    }

    .wrap {
      max-width: 900px;
      margin: 0 auto;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .title {
      font-size: 22px;
      font-weight: 800;
    }

    .meal-tabs {
      display: flex;
      gap: 8px;
    }

    .tab-row {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      margin-bottom: 10px;
      padding-bottom: 2px;
    }

    .tab-row::-webkit-scrollbar {
      height: 5px;
    }

    .tab-row::-webkit-scrollbar-thumb {
      background: #d8dce2;
      border-radius: 999px;
    }

    button {
      border: none;
      border-radius: 14px;
      background: #e9ebef;
      color: #666;
      font-size: 15px;
      font-weight: 700;
      padding: 12px 16px;
      white-space: nowrap;
    }

    button.active {
      background: #10c97f;
      color: white;
    }

    .summary {
      font-size: 14px;
      color: #666;
      margin-bottom: 12px;
    }

    .cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .card {
      background: #f0f7f4;
      border-radius: 22px;
      overflow: hidden;
      cursor: pointer;
      box-shadow: 0 1px 5px rgba(0,0,0,0.05);
      min-height: 220px;
    }

    .card.copied {
      outline: 3px solid rgba(16, 201, 127, 0.28);
    }

    .card-head {
      background: #e4f2ed;
      color: #238f67;
      font-size: 15px;
      font-weight: 800;
      text-align: center;
      padding: 14px 8px;
    }

    .card-body {
      background: #fff;
      padding: 14px 14px 10px 14px;
      min-height: 180px;
      display: flex;
      flex-direction: column;
    }

    .menu {
      white-space: pre-line;
      font-size: 15px;
      line-height: 1.65;
      word-break: keep-all;
      flex: 1;
    }

    .empty {
      color: #999;
    }

    .kcal {
      text-align: right;
      font-size: 14px;
      font-weight: 700;
      color: #333;
      margin-top: 10px;
    }

    .footer {
      margin-top: 12px;
      font-size: 13px;
      color: #777;
      text-align: center;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 20px;
      transform: translateX(-50%);
      background: rgba(17, 24, 39, 0.95);
      color: white;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 700;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.18s ease;
      z-index: 9999;
    }

    .toast.show {
      opacity: 1;
    }

    @media (max-width: 420px) {
      .card-head {
        font-size: 14px;
      }

      .menu {
        font-size: 14px;
      }

      .kcal {
        font-size: 13px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="title" id="pageTitle">4월 21일</div>
      <div class="meal-tabs" id="mealTabs"></div>
    </div>

    <div class="tab-row" id="dayTabs"></div>

    <div class="summary" id="summaryText">불러오는 중...</div>

    <div class="cards">
      <div class="card" id="dormCard" onclick="copyMenu('기숙사 식당 한식', 'dormMenu', 'dormKcal', 'dormCard')">
        <div class="card-head">기숙사 식당 한식</div>
        <div class="card-body">
          <div class="menu" id="dormMenu">불러오는 중...</div>
          <div class="kcal" id="dormKcal"></div>
        </div>
      </div>

      <div class="card" id="studentCard" onclick="copyMenu('학생 식당 한식', 'studentMenu', 'studentKcal', 'studentCard')">
        <div class="card-head">학생 식당 한식</div>
        <div class="card-body">
          <div class="menu" id="studentMenu">불러오는 중...</div>
          <div class="kcal" id="studentKcal"></div>
        </div>
      </div>

      <div class="card" id="facultyCard" onclick="copyMenu('교직원 식당 한식', 'facultyMenu', 'facultyKcal', 'facultyCard')">
        <div class="card-head">교직원 식당 한식</div>
        <div class="card-body">
          <div class="menu" id="facultyMenu">불러오는 중...</div>
          <div class="kcal" id="facultyKcal"></div>
        </div>
      </div>
    </div>

    <div class="footer">카드를 한 번 누르면 복사됩니다.</div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const DAY_CODES = ["SUN", "MON", "TUE", "WED", "THU", "FRI", "SAT"];
    const DAY_LABELS = ["일", "월", "화", "수", "목", "금", "토"];
    const MEAL_TYPES = ["BREAKFAST", "LUNCH", "DINNER"];
    const MEAL_LABELS = {
      BREAKFAST: "아침",
      LUNCH: "점심",
      DINNER: "저녁"
    };

    // 할랄은 제외. 한식 계열만 노출.
    const RESTAURANTS = [
      {
        title: "기숙사 식당 한식",
        menuId: "dormMenu",
        kcalId: "dormKcal",
        aliases: ["기숙사 식당 한식", "기숙사식당한식", "기숙사 식당", "기숙사식당"]
      },
      {
        title: "학생 식당 한식",
        menuId: "studentMenu",
        kcalId: "studentKcal",
        aliases: ["학생 식당 한식", "학생식당한식", "학생 식당", "학생식당"]
      },
      {
        title: "교직원 식당 한식",
        menuId: "facultyMenu",
        kcalId: "facultyKcal",
        aliases: ["교직원 식당 한식", "교직원식당한식", "교직원 식당", "교직원식당"]
      }
    ];

    let allData = [];
    let selectedDayIndex = new Date().getDay();
    let selectedMealType = getDefaultMealType();

    function getDefaultMealType() {
      const hour = new Date().getHours();
      if (hour < 8) return "BREAKFAST";
      if (hour < 13) return "LUNCH";
      if (hour < 18) return "DINNER";
      return "DINNER";
    }

    function getCurrentWeekDate(dayIndex) {
      const now = new Date();
      const todayIndex = now.getDay();
      const diff = dayIndex - todayIndex;
      const target = new Date(now);
      target.setDate(now.getDate() + diff);
      return target;
    }

    function formatDateKorean(dateObj) {
      return `${dateObj.getMonth() + 1}월 ${dateObj.getDate()}일`;
    }

    function formatFullDateKorean(dateObj) {
      const y = dateObj.getFullYear();
      const m = dateObj.getMonth() + 1;
      const d = dateObj.getDate();
      const day = DAY_LABELS[dateObj.getDay()];
      return `${y}년 ${m}월 ${d}일 (${day})`;
    }

    function normalizeText(text) {
      return String(text || "").replace(/\s+/g, "").toLowerCase();
    }

    function isHalal(text) {
      const t = normalizeText(text);
      return t.includes("할랄") || t.includes("halal");
    }

    function renderMealTabs() {
      const container = document.getElementById("mealTabs");
      container.innerHTML = "";

      MEAL_TYPES.forEach(mealType => {
        const btn = document.createElement("button");
        btn.textContent = MEAL_LABELS[mealType];
        if (mealType === selectedMealType) btn.classList.add("active");
        btn.onclick = () => {
          selectedMealType = mealType;
          renderAll();
        };
        container.appendChild(btn);
      });
    }

    function renderDayTabs() {
      const container = document.getElementById("dayTabs");
      container.innerHTML = "";

      // 참고 이미지처럼 월~일까지 보이게
      const order = [1,2,3,4,5,6,0];
      order.forEach(dayIndex => {
        const btn = document.createElement("button");
        btn.textContent = DAY_LABELS[dayIndex];
        if (dayIndex === selectedDayIndex) btn.classList.add("active");
        btn.onclick = () => {
          selectedDayIndex = dayIndex;
          renderAll();
        };
        container.appendChild(btn);
      });
    }

    function findMeal(dayCode, mealType, aliases) {
      return allData.find(item => {
        const restaurantType = normalizeText(item.restaurantType);
        const aliasMatch = aliases.some(alias => normalizeText(alias) === restaurantType);
        return (
          item.dayType === dayCode &&
          item.mealType === mealType &&
          aliasMatch &&
          !isHalal(item.restaurantType)
        );
      });
    }

    function setCard(menuId, kcalId, result) {
      const menuEl = document.getElementById(menuId);
      const kcalEl = document.getElementById(kcalId);

      if (!result) {
        menuEl.textContent = "해당 메뉴가 없습니다.";
        menuEl.classList.add("empty");
        kcalEl.textContent = "";
        return;
      }

      const menus = Array.isArray(result.menus) ? result.menus : [];
      menuEl.textContent = menus.length ? menus.join("\n") : "메뉴 정보가 없습니다.";
      menuEl.classList.remove("empty");
      kcalEl.textContent = result.calorie ? `${result.calorie} kcal` : "";
    }

    function updateHeader() {
      const dateObj = getCurrentWeekDate(selectedDayIndex);
      document.getElementById("pageTitle").textContent = formatDateKorean(dateObj);
      document.getElementById("summaryText").textContent =
        `${formatFullDateKorean(dateObj)} · ${MEAL_LABELS[selectedMealType]}`;
    }

    function renderCards() {
      const dayCode = DAY_CODES[selectedDayIndex];

      const dorm = findMeal(dayCode, selectedMealType, RESTAURANTS[0].aliases);
      const student = findMeal(dayCode, selectedMealType, RESTAURANTS[1].aliases);
      const faculty = findMeal(dayCode, selectedMealType, RESTAURANTS[2].aliases);

      setCard("dormMenu", "dormKcal", dorm);
      setCard("studentMenu", "studentKcal", student);
      setCard("facultyMenu", "facultyKcal", faculty);
    }

    function renderAll() {
      renderMealTabs();
      renderDayTabs();
      updateHeader();
      renderCards();
    }

    function getCopyText(title, menuId, kcalId) {
      const menuText = document.getElementById(menuId).textContent.trim();
      const kcalText = document.getElementById(kcalId).textContent.trim();

      if (!menuText || menuText === "해당 메뉴가 없습니다." || menuText === "불러오는 중..." || menuText === "메뉴 정보가 없습니다.") {
        return null;
      }

      const dateObj = getCurrentWeekDate(selectedDayIndex);
      const dateText = formatFullDateKorean(dateObj);
      const mealLabel = MEAL_LABELS[selectedMealType];

      const lines = menuText
        .split("\n")
        .map(s => s.trim())
        .filter(Boolean)
        .map(s => `- ${s}`)
        .join("\n");

      return `[${title} ${mealLabel} / ${dateText}]
${lines}

${kcalText || "칼로리 정보 없음"}`;
    }

    function showToast(text) {
      const toast = document.getElementById("toast");
      toast.textContent = text;
      toast.classList.add("show");
      clearTimeout(showToast._timer);
      showToast._timer = setTimeout(() => {
        toast.classList.remove("show");
      }, 1200);
    }

    function markCopied(cardId) {
      const card = document.getElementById(cardId);
      card.classList.add("copied");
      setTimeout(() => card.classList.remove("copied"), 800);
    }

    async function copyMenu(title, menuId, kcalId, cardId) {
      const text = getCopyText(title, menuId, kcalId);
      if (!text) {
        showToast("복사할 메뉴가 없어요.");
        return;
      }

      try {
        await navigator.clipboard.writeText(text);
        markCopied(cardId);
        showToast("복사 완료");
      } catch (e) {
        prompt("복사해서 사용하세요:", text);
      }
    }

    async function init() {
      try {
        const res = await fetch("https://meal.hexa.pro/mainpage/data");
        allData = await res.json();
        renderAll();
      } catch (e) {
        document.getElementById("summaryText").textContent = "데이터를 불러오지 못했습니다.";
        document.getElementById("dormMenu").textContent = "불러오기 실패";
        document.getElementById("studentMenu").textContent = "불러오기 실패";
        document.getElementById("facultyMenu").textContent = "불러오기 실패";
      }
    }

    init();
  </script>
</body>
</html>
